<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Templates</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/><link rel="stylesheet" href="/static/css/styles.css"/></head><body><div class="portal-shell" id="portal-shell"></div><script src="/static/js/nav.js"></script><script src="/static/data/content.js"></script><script>document.getElementById('page-title').textContent='Templates';const templates=window.GA_PORTAL_CONTENT.templates;const types=['All',...new Set(templates.map(t=>t.type))];document.getElementById('page-content').innerHTML=`<section><h2>Reusable Communication Templates</h2><p>Use these drafts for hearing reminders, no-show notices, sanctions, hold messaging, parent letters, and staff follow-up.</p><div class='chips'>${types.map((type,i)=>`<button class='chip ${i===0?'active':''}' data-filter='${type}'>${type}</button>`).join('')}</div><div class='grid'>${templates.map((template,index)=>`<article class='card col-6 template-card' data-type='${template.type}'><h3>${template.title}</h3><p>${template.type}</p><textarea id='template-${index}'>${template.body}</textarea><button class='btn btn-soft' data-copy='template-${index}'>Copy Template</button></article>`).join('')}</div></section>`;</script><script src="/static/js/app.js"></script></body></html>
