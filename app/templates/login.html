<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | GA Training Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/portal.css" />
</head>
<body class="login-body">
  <section class="login-card">
    <h1>GA Training Portal</h1>
    <p>Sign in to access Student Conduct training modules.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login" class="login-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label>Username<input name="username" maxlength="60" required /></label>
      <label>Password<input type="password" name="password" minlength="8" required /></label>
      <button type="submit" class="btn-light">Sign In</button>
    </form>
  </section>
</body>
</html>
