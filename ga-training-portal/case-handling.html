<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Case Handling</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"></head><body><div class="portal-shell" id="portal-shell"></div><script src="assets/js/nav.js"></script><script>document.getElementById('page-title').textContent='Case Handling';const steps=['Receive Report','Review Case','Schedule Hearing','Prepare Hearing Materials','Update Maxient','Follow Up','Close Case'];document.getElementById('page-content').innerHTML=`<section class='card'><h2>Case Lifecycle Workflow</h2><p>Expand each stage for details and completion checks.</p>${steps.map((s,i)=>`<article class='card' style='margin-top:.8rem;'><button class='collapse-toggle' data-collapse='case-${i}'>${i+1}. ${s}</button><div class='collapse-content' id='case-${i}' ${i>0?'hidden':''}><p style='margin-top:.5rem;'>Complete this stage with accurate notes, timeline tracking, and FERPA-safe communication.</p><div class='checklist'><label class='check-item' data-check><input type='checkbox'> Verified required records</label><label class='check-item' data-check><input type='checkbox'> Updated tracker and calendar</label></div></div></article>`).join('')}</section>`;</script><script src="assets/js/app.js"></script></body></html>
