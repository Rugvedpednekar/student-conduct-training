<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Case Handling</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/><link rel="stylesheet" href="assets/css/styles.css"/></head><body><div class="portal-shell" id="portal-shell"></div><script src="assets/js/nav.js"></script><script>const steps=['Receive Report','Review Case','Schedule Hearing','Prepare Hearing Materials','Update Maxient','Follow Up','Close Case'];document.getElementById('page-title').textContent='Case Handling';document.getElementById('page-content').innerHTML=`<section class='card'><h2>Case Lifecycle</h2><p>Use this workflow for consistent case management from intake through closure.</p>${steps.map((s,i)=>`<article class='card' style='margin-top:.75rem;'><button class='collapse-toggle' data-collapse='step-${i}'>${i+1}. ${s}</button><div id='step-${i}' ${i?'hidden':''}><p style='margin-top:.45rem;'>Ensure timeline accuracy, clear documentation, and FERPA-safe communication at this stage.</p><div class='checklist'><label class='check-item' data-check><input type='checkbox'/> Required documentation complete</label><label class='check-item' data-check><input type='checkbox'/> Tracker and calendar updated</label><label class='check-item' data-check><input type='checkbox'/> Supervisor notes reviewed if needed</label></div></div></article>`).join('')}</section>`;</script><script src="assets/js/app.js"></script></body></html>
