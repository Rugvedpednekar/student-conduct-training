<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Templates</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"></head><body><div class="portal-shell" id="portal-shell"></div><script src="assets/js/nav.js"></script><script src="assets/data/content.js"></script><script>
document.getElementById('page-title').textContent='Templates';
const templates=window.GA_PORTAL_CONTENT.templates;
const types=['All',...new Set(templates.map(t=>t.type))];
document.getElementById('page-content').innerHTML=`<section><h2>Reusable Communication Templates</h2><p>Use templates as a starting point and tailor details to each case.</p><div class='chips'>${types.map(t=>`<button class='chip ${t==='All'?'active':''}' data-filter='${t}'>${t}</button>`).join('')}</div><div class='grid'>${templates.map((t,i)=>`<article class='card col-6 template-card' data-type='${t.type}'><h3>${t.title}</h3><p>${t.type}</p><textarea id='tmpl-${i}'>${t.body}</textarea><button class='btn btn-soft' data-copy='tmpl-${i}'>Copy Template</button></article>`).join('')}</div></section>`;
</script><script src="assets/js/app.js"></script></body></html>
