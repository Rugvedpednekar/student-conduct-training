<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escalation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=3" />
</head>
<body>
  <div class="portal-shell" id="portal-shell"></div>

  <script src="assets/js/nav.js"></script>
  <script>
    document.getElementById('page-title').textContent = 'Escalation Protocol';
    document.getElementById('page-subtitle').textContent = 'Safety concerns, supervisor guidance, and escalation workflow';

    document.getElementById('page-content').innerHTML = `
      <section class="dashboard-page">

        <section class="dashboard-hero">
          <div class="dashboard-hero-main">
            <div class="dashboard-breadcrumb">Admin Portal › Escalation Guide</div>
            <h1 class="dashboard-title">
              Escalation Guide & <span>Decision Tree</span>
            </h1>
            <p class="dashboard-description">
              Use this framework when a situation moves beyond routine office handling.
              Follow the correct escalation path to protect safety, privacy, and process integrity.
            </p>
          </div>

          <aside class="dashboard-progress-card">
            <div class="dashboard-progress-top">
              <span>Priority</span>
              <strong>Act Quickly</strong>
            </div>
            <div class="progress">
              <span style="width:100%;"></span>
            </div>
            <p>
              If there is any immediate safety concern, stop routine workflow and escalate right away.
            </p>
          </aside>
        </section>

        <section class="grid">
          <article class="card col-6">
            <div style="display:flex;align-items:center;gap:.85rem;margin-bottom:1rem;">
              <div class="function-icon" style="background:#d8e6ff;">✓</div>
              <h2 style="margin:0;">Handle Independently</h2>
            </div>

            <p style="margin-bottom:1rem;">
              Continue normal office workflow only when the issue stays within standard process and does not create
              safety, legal, or major privacy concerns.
            </p>

            <div class="checklist">
              <div class="check-item">Procedural clarification about office process or deadlines</div>
              <div class="check-item">Routine student questions that can be answered with known guidance</div>
              <div class="check-item">Standard follow-up communication using approved office templates</div>
            </div>

            <div class="card" style="margin-top:1rem;background:#f8faff;">
              <h4 style="margin-bottom:.55rem;">Best Practice</h4>
              <p>
                If you can answer it accurately using office workflow and prior guidance, continue. If you are uncertain,
                escalate instead of guessing.
              </p>
            </div>
          </article>

          <article class="card col-6">
            <div style="display:flex;align-items:center;gap:.85rem;margin-bottom:1rem;">
              <div class="function-icon" style="background:#ffd9d7;color:#9f403d;">!</div>
              <h2 style="margin:0;color:#9f403d;">Escalate to Supervisor</h2>
            </div>

            <p style="margin-bottom:1rem;">
              Immediate notification is required when a situation presents safety risk, severe conflict,
              legal sensitivity, or unclear action with significant consequences.
            </p>

            <div class="notice notice-danger" style="margin-bottom:1rem;">
              <strong>Immediate action</strong>
              <p>Any active safety risk must be escalated to a supervisor and campus safety immediately.</p>
            </div>

            <div class="checklist">
              <div class="check-item">Safety concern or active risk</div>
              <div class="check-item">Threatening communication from student, parent, or other party</div>
              <div class="check-item">Legal or media threat</div>
              <div class="check-item">Parent conflict, privacy issue, or unclear sanctioning step</div>
            </div>
          </article>
        </section>

        <section class="dashboard-section">
          <div class="dashboard-section-head">
            <h2>Escalation Decision Tree</h2>
            <span class="badge info">Active Reference</span>
          </div>

          <div class="grid">
            <article class="card col-8">
              <div class="roadmap">
                <div class="step active">
                  <div class="dot">1</div>
                  <div>
                    <strong>Safety Concern</strong>
                    <p>Pause routine workflow immediately and escalate now. Do not continue ordinary case handling.</p>
                  </div>
                </div>

                <div class="step active">
                  <div class="dot">2</div>
                  <div>
                    <strong>Threatening Communication</strong>
                    <p>Preserve the message, avoid escalatory replies, and route it to a supervisor right away.</p>
                  </div>
                </div>

                <div class="step active">
                  <div class="dot">3</div>
                  <div>
                    <strong>Legal / Media Threat</strong>
                    <p>Notify leadership and only use approved communication channels. Do not respond independently.</p>
                  </div>
                </div>

                <div class="step active">
                  <div class="dot">4</div>
                  <div>
                    <strong>Parent Conflict / Privacy Issue / Unclear Sanction</strong>
                    <p>Stop and request direct guidance before taking action or sending any final communication.</p>
                  </div>
                </div>
              </div>
            </article>

            <aside class="card col-4">
              <h3>Documentation Rule</h3>
              <p style="margin-top:.55rem;">
                Preserve clear notes on what happened, when it happened, and what was escalated.
              </p>

              <div class="card" style="margin-top:1rem;background:#f8faff;">
                <h4 style="margin-bottom:.55rem;">Record Immediately</h4>
                <ul class="list-clean">
                  <li>Date and time</li>
                  <li>Who was involved</li>
                  <li>What was said or reported</li>
                  <li>Who was notified</li>
                  <li>What action was taken</li>
                </ul>
              </div>

              <div class="card" style="margin-top:1rem;background:#f8faff;">
                <h4 style="margin-bottom:.55rem;">Reminder</h4>
                <p>
                  If the situation feels urgent, sensitive, or unclear, escalate first and sort out details with supervision.
                </p>
              </div>
            </aside>
          </div>
        </section>

        <section class="dashboard-banner">
          <div class="dashboard-banner-content">
            <div>
              <h3>Need Immediate Guidance?</h3>
              <p>
                Use supervisor guidance for any high-risk concern, threatening message, legal sensitivity,
                or privacy-related uncertainty before proceeding.
              </p>
            </div>

            <div class="dashboard-banner-actions">
              <a class="btn-light" href="office-overview.html">View Key Contacts</a>
              <a class="btn-outline-light" href="templates.html">Open Templates</a>
            </div>
          </div>
        </section>

      </section>
    `;
  </script>
  <script src="assets/js/app.js"></script>
</body>
</html>
